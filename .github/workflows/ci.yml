# Offline CI: lint + tests on every push and PR.
# The test suite never touches the network (fake SDK fixtures), so no
# credentials, services, or Lenz API access are involved.
name: CI

on:
  push:
  pull_request:

# One in-flight run per ref; new pushes cancel the previous run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & test (offline)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install (dev extras only — no network needed to test)
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest (offline)
        run: pytest -q
